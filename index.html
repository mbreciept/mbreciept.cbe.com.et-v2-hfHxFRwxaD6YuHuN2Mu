<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Viewer</title>

    <style>
        body {
            margin: 0;
            background: #f1f3f3;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 95%;
            max-width: 850px;
            margin: 20px auto;
        }
        iframe {
            width: 100%;
            height: 80vh; /* Adjusted slightly to give breathing room for the button */
            border: none;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        .download {
            display: block;
            width: 180px;
            margin: 20px auto;
            text-align: center;
            background: #7a1b87;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
        }
        .download:hover {
            background: #64146f;
        }
    </style>
</head>
<body>

<div class="container">
    <iframe src="https://docs.google.com/gview?url=https://mbreciept.github.io/mbreciept.cbe.com.et-v2-hfHCxzJu1QG9aA1QnkhP/Receipt.pdf&embedded=true"></iframe>

    <a class="download" href="Receipt.pdf" download="Receipt.pdf">Download</a>
</div>

</body>
</html>
